name: tour_guide
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  geolocator: ^14.0.2
  just_audio: ^0.10.5
  shared_preferences: ^2.3.0
  uuid: ^4.5.0
  path_provider: ^2.1.5
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Tour_Guide.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/Tour_Guide.png
    - assets/guides/